<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛博木鱼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #f5c842;
      --gold-light: #ffe680;
      --gold-dark: #c9952a;
      --ink: #1a1a2e;
      --paper: #f5efe0;
      --mist: rgba(200, 220, 230, 0.18);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      user-select: none;
      position: relative;
      background: #1c2a3a;
    }

    /* ===== 西湖背景 SVG ===== */
    #bg-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* 水面波纹动画 */
    @keyframes wave1 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes wave2 {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }
    .wave-g1 { animation: wave1 8s linear infinite; }
    .wave-g2 { animation: wave2 12s linear infinite; }

    /* 荷叶摇曳 */
    @keyframes lotus-sway {
      0%, 100% { transform: rotate(-3deg); }
      50%       { transform: rotate(3deg); }
    }
    .lotus { animation: lotus-sway 4s ease-in-out infinite; transform-origin: center bottom; }
    .lotus2 { animation: lotus-sway 5s ease-in-out infinite reverse; transform-origin: center bottom; }

    /* 烟雾飘动 */
    @keyframes mist-drift {
      0%   { opacity: 0.18; transform: translateX(0) scaleX(1); }
      50%  { opacity: 0.28; transform: translateX(20px) scaleX(1.05); }
      100% { opacity: 0.18; transform: translateX(0) scaleX(1); }
    }
    .mist1 { animation: mist-drift 10s ease-in-out infinite; }
    .mist2 { animation: mist-drift 14s ease-in-out infinite reverse; }

    /* 灯笼摆动 */
    @keyframes lantern-swing {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg); }
    }
    .lantern { animation: lantern-swing 3s ease-in-out infinite; transform-origin: top center; }

    /* ===== UI 层 ===== */
    #ui-layer {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
    }

    /* 顶部标题 */
    .title-wrap {
      text-align: center;
      margin-bottom: 0.6em;
    }

    .title {
      font-family: 'ZCOOL XiaoWei', 'STKaiti', serif;
      font-size: clamp(2.2rem, 7vw, 4rem);
      color: var(--gold);
      text-shadow:
        0 0 18px rgba(245, 200, 66, 0.7),
        0 0 40px rgba(245, 200, 66, 0.3),
        2px 3px 6px rgba(0,0,0,0.9);
      letter-spacing: 0.5em;
      line-height: 1.2;
    }

    .title-deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      margin-top: 0.2em;
    }
    .title-deco-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dark));
      opacity: 0.7;
    }
    .title-deco-line.rev {
      background: linear-gradient(to left, transparent, var(--gold-dark));
    }
    .title-deco-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dark);
      opacity: 0.8;
    }

    /* 功德区 */
    .merit-display {
      text-align: center;
      margin-bottom: 0.6em;
    }
    .merit-label {
      font-size: 0.85rem;
      color: rgba(245, 200, 66, 0.55);
      letter-spacing: 0.4em;
      margin-bottom: 0.1em;
    }
    .merit-value {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: clamp(3rem, 10vw, 5rem);
      color: var(--gold);
      text-shadow:
        0 0 30px rgba(245, 200, 66, 0.8),
        0 0 60px rgba(245, 200, 66, 0.3);
      line-height: 1;
    }
    .merit-value.bump {
      animation: merit-bump 0.3s ease-out;
    }
    @keyframes merit-bump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* COMBO */
    .combo-display {
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5em;
      margin-bottom: 0.3em;
      transition: opacity 0.3s;
    }
    .combo-display.hidden { opacity: 0; }
    .combo-text {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 1.3rem;
      color: #ff9900;
      text-shadow: 0 0 15px rgba(255, 153, 0, 0.8);
      animation: combo-pulse 0.4s ease-out;
    }
    @keyframes combo-pulse {
      0%   { transform: scale(0.8); opacity: 0.5; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .combo-x2 {
      font-size: 0.82rem;
      color: #ffcc44;
      background: rgba(255, 153, 0, 0.15);
      border: 1px solid rgba(255, 153, 0, 0.45);
      border-radius: 4px;
      padding: 0.1em 0.4em;
      font-family: 'Noto Serif SC', serif;
    }

    /* 木鱼 */
    .muyu-wrapper {
      position: relative;
      cursor: pointer;
      margin: 0.3em auto 1em;
      width: clamp(150px, 32vw, 210px);
      height: clamp(150px, 32vw, 210px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .muyu-shadow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 65%;
      height: 18px;
      background: rgba(0,0,0,0.35);
      border-radius: 50%;
      filter: blur(7px);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .muyu-svg {
      width: 100%;
      height: 100%;
      transform-origin: center bottom;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.7));
    }
    .muyu-svg.hit {
      animation: muyu-hit 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes muyu-hit {
      0%   { transform: scaleY(1) translateY(0); }
      20%  { transform: scaleY(0.88) translateY(6px); }
      50%  { transform: scaleY(1.04) translateY(-4px); }
      75%  { transform: scaleY(0.97) translateY(2px); }
      100% { transform: scaleY(1) translateY(0); }
    }

    /* 飘字 */
    #float-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 100;
    }
    .float-text {
      position: absolute;
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(245, 200, 66, 0.9);
      white-space: nowrap;
      animation: float-up 1.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes float-up {
      0%   { opacity: 1;   transform: translateY(0) scale(1); }
      30%  { opacity: 1;   transform: translateY(-40px) scale(1.1); }
      100% { opacity: 0;   transform: translateY(-130px) scale(0.8); }
    }

    /* 底部 */
    .bottom-info {
      text-align: center;
      margin-top: 0.3em;
    }
    .hint {
      font-size: 0.78rem;
      color: rgba(245, 200, 66, 0.38);
      letter-spacing: 0.2em;
      margin-bottom: 0.4em;
    }
    .best-merit {
      font-size: 0.8rem;
      color: rgba(245, 200, 66, 0.5);
      letter-spacing: 0.1em;
    }
    .best-merit span { color: var(--gold-dark); font-weight: 700; }

    /* 里程碑弹窗 */
    .milestone-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .milestone-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .milestone-box {
      background: linear-gradient(145deg, #1e2f1e, #0f1e2e);
      border: 2px solid var(--gold-dark);
      border-radius: 16px;
      padding: 2em 3em;
      text-align: center;
      box-shadow: 0 0 40px rgba(245, 200, 66, 0.25), inset 0 0 30px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .milestone-overlay.show .milestone-box { transform: scale(1); }
    .milestone-emoji { font-size: 3rem; display: block; margin-bottom: 0.3em; }
    .milestone-merit {
      font-size: 0.95rem;
      color: var(--gold-dark);
      letter-spacing: 0.25em;
      margin-bottom: 0.3em;
      font-family: 'Noto Serif SC', serif;
    }
    .milestone-title {
      font-family: 'ZCOOL XiaoWei', serif;
      font-size: 2rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(245, 200, 66, 0.7);
      letter-spacing: 0.4em;
      margin-bottom: 1em;
    }
    .milestone-close {
      font-size: 0.85rem;
      color: rgba(245, 200, 66, 0.55);
      cursor: pointer;
      padding: 0.5em 1.5em;
      border: 1px solid rgba(245, 200, 66, 0.3);
      border-radius: 20px;
      transition: all 0.2s;
      background: transparent;
      font-family: 'ZCOOL XiaoWei', serif;
      letter-spacing: 0.2em;
    }
    .milestone-close:hover {
      background: rgba(245, 200, 66, 0.1);
      color: var(--gold);
      border-color: var(--gold-dark);
    }

    /* 涟漪 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(245, 200, 66, 0.2);
      transform: scale(0);
      animation: ripple-expand 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-expand {
      to { transform: scale(4); opacity: 0; }
    }

    /* 水面涟漪（背景装饰） */
    .water-ripple {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(180, 220, 240, 0.18);
      pointer-events: none;
      z-index: 1;
      animation: water-expand linear infinite;
    }
    @keyframes water-expand {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.5; }
      100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
    }

    /* 飘落花瓣/叶片 */
    .falling-petal {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      animation: petal-fall linear forwards;
      opacity: 0.7;
    }
    @keyframes petal-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ===== 西湖背景场景 ===== -->
<svg id="bg-scene" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 天空渐变：黄昏/夜晚感 -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1b2a"/>
      <stop offset="40%"  stop-color="#1a2e40"/>
      <stop offset="70%"  stop-color="#2a3d30"/>
      <stop offset="100%" stop-color="#1a2a20"/>
    </linearGradient>
    <!-- 水面渐变 -->
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a3040" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d1a25"/>
    </linearGradient>
    <!-- 月亮光晕 -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fffbe8" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffeebb" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffeebb" stop-opacity="0"/>
    </radialGradient>
    <!-- 水面波纹图案 -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(180,220,240,0.18)"/>
      <stop offset="100%" stop-color="rgba(180,220,240,0)"/>
    </linearGradient>
    <!-- 灯笼红 -->
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff6633" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#cc3300" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#991100" stop-opacity="0"/>
    </radialGradient>
    <!-- 倒影渐变 -->
    <linearGradient id="reflGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(200,180,100,0.25)"/>
      <stop offset="100%" stop-color="rgba(200,180,100,0)"/>
    </linearGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 天空 -->
  <rect width="1440" height="900" fill="url(#skyGrad)"/>

  <!-- 星星 -->
  <g opacity="0.7">
    <circle cx="120" cy="60"  r="1.2" fill="white"/>
    <circle cx="280" cy="35"  r="0.9" fill="white"/>
    <circle cx="450" cy="80"  r="1.1" fill="white"/>
    <circle cx="600" cy="30"  r="0.8" fill="white"/>
    <circle cx="780" cy="55"  r="1.3" fill="white"/>
    <circle cx="900" cy="25"  r="0.9" fill="white"/>
    <circle cx="1050" cy="70" r="1.0" fill="white"/>
    <circle cx="1200" cy="45" r="1.2" fill="white"/>
    <circle cx="1350" cy="85" r="0.8" fill="white"/>
    <circle cx="200" cy="110" r="0.7" fill="white"/>
    <circle cx="380" cy="150" r="0.6" fill="white"/>
    <circle cx="680" cy="120" r="0.8" fill="white"/>
    <circle cx="860" cy="100" r="0.7" fill="white"/>
    <circle cx="1100" cy="130"r="0.9" fill="white"/>
    <circle cx="1300" cy="110"r="0.7" fill="white"/>
  </g>

  <!-- 月亮光晕 -->
  <circle cx="1100" cy="100" r="80" fill="url(#moonGlow)" opacity="0.35"/>
  <!-- 月亮主体 -->
  <circle cx="1100" cy="100" r="38" fill="#fffbe0" opacity="0.95"/>
  <circle cx="1100" cy="100" r="36" fill="#fff8d0"/>
  <!-- 月亮阴影（弯月效果） -->
  <circle cx="1112" cy="96" r="30" fill="#1a2e40" opacity="0.55"/>

  <!-- 远山（层叠） -->
  <!-- 最远层山 -->
  <path d="M0 420 Q200 300 400 380 Q600 280 800 360 Q1000 270 1200 350 Q1350 300 1440 380 L1440 900 L0 900Z"
        fill="#162030" opacity="0.8"/>
  <!-- 中远层山 -->
  <path d="M0 480 Q180 360 350 440 Q520 340 700 420 Q880 330 1060 410 Q1240 350 1440 440 L1440 900 L0 900Z"
        fill="#1a2a35" opacity="0.9"/>

  <!-- ===== 灵隐寺宝塔（左侧） ===== -->
  <g transform="translate(130, 200)" opacity="0.85">
    <!-- 塔身（5层） -->
    <!-- 第5层（顶） -->
    <rect x="32" y="0"  width="36" height="22" rx="1" fill="#1e3040"/>
    <path d="M28 0 L50 -10 L72 0Z" fill="#2a4050"/>
    <rect x="26" y="-2" width="48" height="4" rx="1" fill="#3a5060"/>
    <!-- 第4层 -->
    <rect x="26" y="22" width="48" height="24" rx="1" fill="#1e3040"/>
    <path d="M20 22 L50 10 L80 22Z" fill="#2a4050"/>
    <rect x="18" y="20" width="64" height="4" rx="1" fill="#3a5060"/>
    <!-- 第3层 -->
    <rect x="18" y="46" width="64" height="26" rx="1" fill="#1a2c3a"/>
    <path d="M10 46 L50 32 L90 46Z" fill="#243850"/>
    <rect x="8"  y="44" width="84" height="4" rx="1" fill="#344858"/>
    <!-- 第2层 -->
    <rect x="8"  y="72" width="84" height="28" rx="1" fill="#182838"/>
    <path d="M0 72 L50 56 L100 72Z" fill="#223448"/>
    <rect x="-2" y="70" width="104" height="5" rx="1" fill="#304250"/>
    <!-- 第1层（底） -->
    <rect x="-2" y="100" width="104" height="32" rx="1" fill="#162436"/>
    <path d="M-12 100 L50 82 L112 100Z" fill="#1e3040"/>
    <rect x="-14" y="98" width="128" height="5" rx="1" fill="#2a3e4e"/>
    <!-- 台阶 -->
    <rect x="10" y="132" width="80" height="8" rx="1" fill="#142030"/>
    <rect x="20" y="140" width="60" height="6" rx="1" fill="#102030"/>
    <!-- 塔尖 -->
    <rect x="47" y="-22" width="6" height="24" rx="2" fill="#4a6070"/>
    <polygon points="50,-32 46,-22 54,-22" fill="#5a7080"/>
    <!-- 窗户（各层） -->
    <rect x="42" y="6"  width="16" height="10" rx="2" fill="#2a4050" opacity="0.6"/>
    <rect x="36" y="30" width="10" height="8"  rx="1" fill="#2a4050" opacity="0.5"/>
    <rect x="54" y="30" width="10" height="8"  rx="1" fill="#2a4050" opacity="0.5"/>
    <!-- 灯光 -->
    <rect x="43" y="7"  width="14" height="8" rx="1" fill="#ffcc44" opacity="0.25"/>
    <rect x="37" y="31" width="8" height="6"  rx="1" fill="#ffcc44" opacity="0.2"/>
  </g>

  <!-- ===== 断桥/长堤（横跨水面） ===== -->
  <!-- 堤岸 -->
  <path d="M0 550 Q360 530 720 545 Q1080 530 1440 550 L1440 580 Q1080 560 720 575 Q360 560 0 580Z"
        fill="#1a2e1e" opacity="0.9"/>
  <!-- 堤上小路 -->
  <path d="M0 557 Q360 540 720 552 Q1080 540 1440 557"
        stroke="#2a4030" stroke-width="4" fill="none" opacity="0.7"/>

  <!-- 拱桥（断桥） -->
  <g transform="translate(580, 500)" opacity="0.9">
    <!-- 桥拱 -->
    <path d="M0 50 Q80 -10 160 50" stroke="#2a4050" stroke-width="18" fill="none"/>
    <path d="M0 50 Q80 -10 160 50" stroke="#344860" stroke-width="14" fill="none"/>
    <!-- 桥面 -->
    <rect x="-5" y="45" width="170" height="14" rx="4" fill="#2a3e4e"/>
    <rect x="-5" y="45" width="170" height="6"  rx="3" fill="#344858"/>
    <!-- 桥栏 -->
    <line x1="0"   y1="44" x2="0"   y2="28" stroke="#3a5060" stroke-width="3"/>
    <line x1="20"  y1="38" x2="20"  y2="24" stroke="#3a5060" stroke-width="3"/>
    <line x1="40"  y1="32" x2="40"  y2="20" stroke="#3a5060" stroke-width="2.5"/>
    <line x1="60"  y1="29" x2="60"  y2="18" stroke="#3a5060" stroke-width="2.5"/>
    <line x1="80"  y1="28" x2="80"  y2="17" stroke="#3a5060" stroke-width="2.5"/>
    <line x1="100" y1="29" x2="100" y2="18" stroke="#3a5060" stroke-width="2.5"/>
    <line x1="120" y1="32" x2="120" y2="20" stroke="#3a5060" stroke-width="2.5"/>
    <line x1="140" y1="38" x2="140" y2="24" stroke="#3a5060" stroke-width="3"/>
    <line x1="160" y1="44" x2="160" y2="28" stroke="#3a5060" stroke-width="3"/>
    <!-- 桥栏横线 -->
    <path d="M0 28 Q80 16 160 28" stroke="#3a5060" stroke-width="2.5" fill="none"/>
  </g>

  <!-- ===== 水面 ===== -->
  <rect x="0" y="560" width="1440" height="340" fill="url(#waterGrad)"/>

  <!-- 水面波纹 -->
  <g class="wave-g1" opacity="0.4">
    <path d="M0 590 Q90 582 180 590 Q270 598 360 590 Q450 582 540 590 Q630 598 720 590 Q810 582 900 590 Q990 598 1080 590 Q1170 582 1260 590 Q1350 598 1440 590 Q1530 582 1620 590 Q1710 598 1800 590 Q1890 582 1980 590 Q2070 598 2160 590 Q2250 582 2340 590 Q2430 598 2520 590 Q2610 582 2700 590 Q2790 598 2880 590" stroke="rgba(180,220,240,0.5)" stroke-width="1.5" fill="none"/>
    <path d="M0 620 Q120 612 240 620 Q360 628 480 620 Q600 612 720 620 Q840 628 960 620 Q1080 612 1200 620 Q1320 628 1440 620 Q1560 612 1680 620 Q1800 628 1920 620 Q2040 612 2160 620 Q2280 628 2400 620 Q2520 612 2640 620 Q2760 628 2880 620" stroke="rgba(180,220,240,0.3)" stroke-width="1" fill="none"/>
    <path d="M0 650 Q100 644 200 650 Q300 656 400 650 Q500 644 600 650 Q700 656 800 650 Q900 644 1000 650 Q1100 656 1200 650 Q1300 644 1400 650 Q1500 656 1600 650 Q1700 644 1800 650 Q1900 656 2000 650 Q2100 644 2200 650 Q2300 656 2400 650 Q2500 644 2600 650 Q2700 656 2800 650" stroke="rgba(180,220,240,0.2)" stroke-width="1" fill="none"/>

  let dongLoadStarted = false;
  function loadDongBuffer() {
    if (dongLoadStarted) return;
    dongLoadStarted = true;
    try {
      const ctx = getAudioCtx();
      const bin = atob(DONG_B64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      // 使用 Promise API，更现代更可靠
      ctx.decodeAudioData(bytes.buffer.slice(0))
        .then(buf => {
          decodedDongBuffer = buf;
          console.log('木鱼音频加载成功，时长:', buf.duration.toFixed(2), '秒');
          // 截断到木鱼击打部分，做成单次击打的短 buffer，彻底消除 offset 延迟
          const sr = buf.sampleRate;
          const offsetSamples = Math.floor(2.44 * sr);
          const durationSamples = Math.floor(1.8 * sr);
          const shortBuf = ctx.createBuffer(buf.numberOfChannels, durationSamples, sr);
          for (let ch = 0; ch < buf.numberOfChannels; ch++) {
            const src = buf.getChannelData(ch).subarray(offsetSamples, offsetSamples + durationSamples);
            shortBuf.getChannelData(ch).set(src);
          }
          decodedDongBuffer = shortBuf; // 替换为已裁好的短 buffer
        })
        .catch(e => {
          console.warn('木鱼音频解码失败，使用合成音:', e);
          dongLoadStarted = false; // 允许重试
        });
    } catch(e) {
      console.warn('loadDongBuffer 异常:', e);
      dongLoadStarted = false;
    }
  }

  // 页面加载时立即创建 AudioContext 并开始解码音频 buffer
  // decodeAudioData 不需要 AudioContext running，suspended 状态也可以解码
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    loadDongBuffer(); // 立即开始解码，不等用户点击
  } catch(e) { console.warn('AudioContext 创建失败:', e); }

  function playDong(isComboMode) {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // 优先使用真实木鱼音频
    // buffer 在解码时已裁好（offset 2.44s，duration 1.8s），直接播放即可
    function playReal() {
      const src = ctx.createBufferSource();
      src.buffer = decodedDongBuffer;
      src.playbackRate.value = isComboMode ? 1.15 : 1.0;
      const gainNode = ctx.createGain();
      gainNode.gain.value = 1.4;
      src.connect(gainNode);
      gainNode.connect(ctx.destination);
      src.start(ctx.currentTime); // buffer 已裁好，无 offset，零延迟
    }
    if (decodedDongBuffer) {
      playReal();
      return;
    }
    // buffer 还未就绪，降级到合成音（正常不应该发生）

    // 备用合成音效（真实音频未加载时使用）
    const f0 = isComboMode ? 920 : 800;

    // 1. 冲击噪声：木槌击打瞬间"哒"感，指数衰减噪声+高通+峰值
    const sr = ctx.sampleRate;
    const nBuf = ctx.createBuffer(1, Math.floor(sr * 0.008), sr);
    const nd = nBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * Math.pow(1 - i/nd.length, 3);
    const nSrc = ctx.createBufferSource(); nSrc.buffer = nBuf;
    const nHP = ctx.createBiquadFilter(); nHP.type = 'highpass'; nHP.frequency.value = 1200;
    const nPeak = ctx.createBiquadFilter(); nPeak.type = 'peaking'; nPeak.frequency.value = 2500; nPeak.gain.value = 14; nPeak.Q.value = 2;
    const nGain = ctx.createGain(); nGain.gain.setValueAtTime(1.1, now); nGain.gain.exponentialRampToValueAtTime(0.001, now+0.008);
    nSrc.connect(nHP); nHP.connect(nPeak); nPeak.connect(nGain); nGain.connect(ctx.destination);
    nSrc.start(now); nSrc.stop(now+0.01);

    // 2. 主空腔共鸣：极快攻击 + 双段衰减
    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(f0 * 1.06, now);
    o1.frequency.exponentialRampToValueAtTime(f0, now+0.01);
    o1.frequency.exponentialRampToValueAtTime(f0 * 0.98, now+0.06);
    g1.gain.setValueAtTime(0, now);
    g1.gain.linearRampToValueAtTime(0.8, now+0.0015);
    g1.gain.exponentialRampToValueAtTime(0.12, now+0.03);
    g1.gain.exponentialRampToValueAtTime(0.001, now+0.45);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(now); o1.stop(now+0.5);

    // 3. 第一泛音（非整数比 2.83x，木质特征）
    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
    o2.type = 'sine'; o2.frequency.value = f0 * 2.83;
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.25, now+0.001);
    g2.gain.exponentialRampToValueAtTime(0.001, now+0.09);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(now); o2.stop(now+0.1);

    // 4. 第二泛音（5.1x，极快消散）
    const o3 = ctx.createOscillator(); const g3 = ctx.createGain();
    o3.type = 'sine'; o3.frequency.value = f0 * 5.1;
    g3.gain.setValueAtTime(0, now);
    g3.gain.linearRampToValueAtTime(0.09, now+0.0008);
    g3.gain.exponentialRampToValueAtTime(0.001, now+0.03);
    o3.connect(g3); g3.connect(ctx.destination);
    o3.start(now); o3.stop(now+0.04);

    // 5. 低频体振（增加厚度）
    const o4 = ctx.createOscillator(); const g4 = ctx.createGain();
    o4.type = 'sine'; o4.frequency.value = f0 * 0.5;
    g4.gain.setValueAtTime(0, now);
    g4.gain.linearRampToValueAtTime(0.15, now+0.002);
    g4.gain.exponentialRampToValueAtTime(0.001, now+0.18);
    o4.connect(g4); g4.connect(ctx.destination);
    o4.start(now); o4.stop(now+0.2);

    // 6. 木腔反射（极短延迟模拟内壁）
    [0.006, 0.014].forEach((dt, i) => {
      const delay = ctx.createDelay(0.05); delay.delayTime.value = dt;
      const dg = ctx.createGain(); dg.gain.value = 0.13 - i*0.05;
      g1.connect(delay); delay.connect(dg); dg.connect(ctx.destination);
    });
  }

  function updateCombo() {
    const now = Date.now();
    lastHitTimes.push(now);
    lastHitTimes = lastHitTimes.filter(t => now - t < 1000);
    if (lastHitTimes.length >= 4) {

      comboCount = lastHitTimes.length;
      comboDisp.classList.remove('hidden');
      comboText.textContent = `COMBO x${comboCount}`;
      comboText.style.animation = 'none';
      void comboText.offsetWidth;
      comboText.style.animation = '';
    } else {
      comboCount = 0;
    }
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      isCombo = false; comboCount = 0; lastHitTimes = [];
      comboDisp.classList.add('hidden');
    }, 1200);
  }

    merit += amount;

  function makeNoiseBuf(ctx, seconds) {
    const buf = ctx.createBuffer(1, ctx.sampleRate * seconds, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
    return buf;
  }

  function buildAmbient(ctx, sceneIdx) {
    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0, ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(1, ctx.currentTime + 1.5);
    masterGain.connect(ctx.destination);
    const srcs = [], oscs = [];

    if (sceneIdx === 0) {
      // 西湖：湖水声（白噪声+双重低通+LFO起伏）
      const buf = makeNoiseBuf(ctx, 3);
      const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp1 = ctx.createBiquadFilter(); lp1.type='lowpass'; lp1.frequency.value=350;
      const lp2 = ctx.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=180;
      const wGain = ctx.createGain(); wGain.gain.value = 0.018;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 0.25;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.025;
      lfo.connect(lfoG); lfoG.connect(wGain.gain);
      src.connect(lp1); lp1.connect(lp2); lp2.connect(wGain); wGain.connect(masterGain);
      src.start(); lfo.start();
      srcs.push(src); oscs.push(lfo);
      masterGain.gain.setValueAtTime(0, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(1, ctx.currentTime+1.5);

    } else if (sceneIdx === 1) {
      // 竹林：蝉鸣（FM合成）
      const carrier = ctx.createOscillator();
      const mod = ctx.createOscillator();
      const modG = ctx.createGain();
      carrier.frequency.value = 3600; mod.frequency.value = 160; modG.gain.value = 380;
      const volLFO = ctx.createOscillator(); volLFO.frequency.value = 0.7;
      const volLFOG = ctx.createGain(); volLFOG.gain.value = 0.025;
      const cGain = ctx.createGain(); cGain.gain.value = 0.012;
      mod.connect(modG); modG.connect(carrier.frequency);
      volLFO.connect(volLFOG); volLFOG.connect(cGain.gain);
      carrier.connect(cGain); cGain.connect(masterGain);
      // 加一丝鸟声（间歇）
      carrier.start(); mod.start(); volLFO.start();
      oscs.push(carrier, mod, volLFO);
      // 偶尔的风声底噪
      const wBuf = makeNoiseBuf(ctx, 2);
      const wSrc = ctx.createBufferSource(); wSrc.buffer = wBuf; wSrc.loop = true;
      const wHP = ctx.createBiquadFilter(); wHP.type='bandpass'; wHP.frequency.value=800; wHP.Q.value=0.3;
      const wG = ctx.createGain(); wG.gain.value = 0.004;
      wSrc.connect(wHP); wHP.connect(wG); wG.connect(masterGain);
      wSrc.start(); srcs.push(wSrc);

    } else if (sceneIdx === 2) {
      // 山间：山风声（带通噪声+扫频LFO）
      const buf = makeNoiseBuf(ctx, 4);
      const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700; bp.Q.value=0.5;
      const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.1;
      const lfoG = ctx.createGain(); lfoG.gain.value=250;
      lfo.connect(lfoG); lfoG.connect(bp.frequency);
      const wG = ctx.createGain(); wG.gain.value=0.01;
      src.connect(bp); bp.connect(wG); wG.connect(masterGain);
      src.start(); lfo.start(); srcs.push(src); oscs.push(lfo);

    } else if (sceneIdx === 3) {
      // 桃花溪涧：溪水（较高频噪声）+ 间歇鸟叫
      const buf = makeNoiseBuf(ctx, 3);
      const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600;
      const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=180;
      const wG = ctx.createGain(); wG.gain.value=0.015;
      src.connect(lp); lp.connect(hp); hp.connect(wG); wG.connect(masterGain);
      src.start(); srcs.push(src);
      // 间歇鸟叫
      function playBird() {
        const bCtx = getAudioCtx();
        const bOsc = bCtx.createOscillator();
        const bG = bCtx.createGain();
        const startF = 1800 + Math.random()*600;
        bOsc.frequency.setValueAtTime(startF, bCtx.currentTime);
        bOsc.frequency.exponentialRampToValueAtTime(startF*1.4, bCtx.currentTime+0.12);
        bOsc.frequency.exponentialRampToValueAtTime(startF*0.9, bCtx.currentTime+0.25);
        bG.gain.setValueAtTime(0, bCtx.currentTime);
        bG.gain.linearRampToValueAtTime(0.06, bCtx.currentTime+0.05);
        bG.gain.exponentialRampToValueAtTime(0.001, bCtx.currentTime+0.3);
        bOsc.connect(bG); bG.connect(masterGain);
        bOsc.start(); bOsc.stop(bCtx.currentTime+0.35);
      }
      const birdTimer = setInterval(playBird, 8000 + Math.random()*7000);
      playBird();
      ambientNodes = { srcs, oscs, masterGain, birdTimer };
      return ambientNodes;

    } else if (sceneIdx === 4) {
      // 虚空极乐：颂钵共鸣（432/528/639 Hz和声）
      [432, 528, 639].forEach(freq => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        // 缓慢颤音
        const vib = ctx.createOscillator(); vib.frequency.value = 0.15;
        const vibG = ctx.createGain(); vibG.gain.value = 1.5;
        vib.connect(vibG); vibG.connect(o.frequency);
        g.gain.value = 0.008;
        o.connect(g); g.connect(masterGain);
        o.start(); vib.start();
        oscs.push(o, vib);
      });
    }

    return { srcs, oscs, masterGain };
  }

  const AVATARS = ['🐾','🦊','🐼','🐨','🐸','🦄','🐯','🐶','🐱','🐰'];
  const MY_AVATAR = AVATARS[Math.floor(Math.random()*AVATARS.length)];

  // 在线用户列表
  let onlineUsers = {};

  // ===== UI：右侧聊天面板 =====
  const panel = document.createElement('div');
  panel.id = 'multi-panel';
  panel.innerHTML = `
    <div id="panel-header">
      <span id="online-count">🕯️ 独自修行</span>
      <button id="panel-toggle">收起</button>
    </div>
    <div id="users-list"></div>
    <div id="chat-box"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="说点什么..." maxlength="50" />
      <button id="chat-send">发</button>
    </div>
  `;
  document.body.appendChild(panel);

  // 面板样式
  const style = document.createElement('style');
  style.textContent = `
    #multi-panel {
      position: fixed; right: 0; top: 50%; transform: translateY(-50%);
      width: 220px; background: rgba(10,8,6,0.85); border-left: 1px solid rgba(245,200,66,0.2);
      border-radius: 12px 0 0 12px; display: flex; flex-direction: column;
      z-index: 999; font-family: 'ZCOOL XiaoWei', serif; color: #e8d5a3;
      max-height: 70vh; backdrop-filter: blur(8px);
      transition: width 0.3s;
    }
    #multi-panel.collapsed { width: 40px; }
    #multi-panel.collapsed #users-list,
    #multi-panel.collapsed #chat-box,
    #multi-panel.collapsed #chat-input-row { display: none; }
    #panel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-bottom: 1px solid rgba(245,200,66,0.15);
      font-size: 13px; flex-shrink: 0;
    }
    #panel-toggle {
      background: none; border: 1px solid rgba(245,200,66,0.3); color: #c8a96e;
      border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 11px;
    }
    #users-list {
      padding: 8px 10px; font-size: 12px; border-bottom: 1px solid rgba(245,200,66,0.1);
      flex-shrink: 0; max-height: 80px; overflow-y: auto;
    }
    .user-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .user-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    #chat-box {
      flex: 1; overflow-y: auto; padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px; min-height: 120px;
    }
    .chat-msg { font-size: 12px; line-height: 1.4; word-break: break-all; }
    .chat-msg .msg-user { font-size: 11px; opacity: 0.6; margin-bottom: 2px; }
    .chat-msg .msg-text { background: rgba(245,200,66,0.08); border-radius: 6px; padding: 4px 8px; }
    .chat-msg.mine .msg-text { background: rgba(245,200,66,0.18); text-align: right; }
    .chat-msg.system { text-align: center; font-size: 11px; opacity: 0.5; font-style: italic; }
    #chat-input-row {
      display: flex; gap: 6px; padding: 8px 10px;
      border-top: 1px solid rgba(245,200,66,0.1); flex-shrink: 0;
    }
    #chat-input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(245,200,66,0.2);
      border-radius: 6px; color: #e8d5a3; font-size: 12px; padding: 5px 8px;
      font-family: inherit; outline: none;
    }
    #chat-send {
      background: rgba(245,200,66,0.2); border: 1px solid rgba(245,200,66,0.3);
      color: #f5c842; border-radius: 6px; padding: 5px 10px; cursor: pointer;
      font-size: 12px; font-family: inherit;
    }
    #chat-send:hover { background: rgba(245,200,66,0.35); }
    .other-hit-anim {
      position: fixed; pointer-events: none; z-index: 500;
      font-size: 28px; animation: other-hit 0.6s ease-out forwards;
    }
    @keyframes other-hit {
      0% { transform: scale(0.5) translateY(0); opacity: 1; }
      100% { transform: scale(1.5) translateY(-40px); opacity: 0; }
    }
  `;
  document.head.appendChild(style);

  // 收起/展开面板
  document.getElementById('panel-toggle').addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    document.getElementById('panel-toggle').textContent = panel.classList.contains('collapsed') ? '展' : '收起';
  });

  // 加消息到聊天框
  function addChatMsg(userId, avatar, color, text, isSystem = false) {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    if (isSystem) {
      div.className = 'chat-msg system';
      div.textContent = text;
    } else {
      const isMe = userId === MY_ID;
      div.className = 'chat-msg' + (isMe ? ' mine' : '');
      div.innerHTML = `
        <div class="msg-user" style="color:${color}">${avatar} ${isMe ? '我' : userId.slice(5)}</div>
        <div class="msg-text">${text}</div>
      `;
    }
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    // 最多保留50条
    while (box.children.length > 50) box.removeChild(box.firstChild);
  }

  // 更新在线用户列表
  function updateUsersList() {
    const list = document.getElementById('users-list');
    const count = Object.keys(onlineUsers).length;
    document.getElementById('online-count').textContent =
      count <= 1 ? '🕯️ 独自修行' : `🕯️ ${count}人共修`;
    list.innerHTML = Object.values(onlineUsers).map(u => `
      <div class="user-item">
        <div class="user-dot" style="background:${u.color}"></div>
        <span>${u.avatar} ${u.id === MY_ID ? '我' : u.id.slice(5)}</span>
        <span style="margin-left:auto;font-size:11px;opacity:0.6">${u.merit||0}功德</span>
      </div>
    `).join('');
  }

  // 别人敲击时的动画
  function showOtherHit(avatar, color) {
    const el = document.createElement('div');
    el.className = 'other-hit-anim';
    el.textContent = avatar;
    el.style.left = (20 + Math.random() * (window.innerWidth - 100)) + 'px';
    el.style.top = (window.innerHeight * 0.3 + Math.random() * window.innerHeight * 0.3) + 'px';
    el.style.color = color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // 连接 Supabase Realtime
  let channel;
  function connectRealtime() {
    const ws = new WebSocket(
      `wss://dwgqoypexcvhtkuxfokv.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`
    );

    ws.onopen = () => {
      // 加入 channel（self:true 让自己也能收到自己发的消息，方便调试）
      ws.send(JSON.stringify({
        topic: `realtime:${ROOM}`,
        event: 'phx_join',
        payload: { config: { broadcast: { self: true } } },
        ref: '1'
      }));
      // 心跳
      setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: 'hb' }));
        }
      }, 25000);
      // 加入后广播自己上线，并定期重播（让后来者知道我在）
      setTimeout(() => broadcastPresence(), 800);
      setInterval(() => broadcastPresence(), 8000);
      addChatMsg(null, null, null, '已连接，正在寻找同修...', true);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        // Supabase Realtime broadcast 实际结构：
        // { event: 'broadcast', payload: { event: 'msg', payload: { type, userId, ... } } }
        if (msg.event === 'broadcast' && msg.payload?.payload?.type) {
          const { type, userId, avatar, color, merit: m, text } = msg.payload.payload;
          if (userId === MY_ID) return; // 忽略自己发的

          if (type === 'presence') {
            const isNew = !onlineUsers[userId];
            onlineUsers[userId] = { id: userId, avatar, color, merit: m };
            updateUsersList();
            if (isNew) {
              addChatMsg(null, null, null, `${avatar} 新的修行者到来`, true);
            }
          } else if (type === 'hit') {
            onlineUsers[userId] = { ...(onlineUsers[userId]||{}), id: userId, avatar, color, merit: m };
            updateUsersList();
            showOtherHit(avatar, color);
          } else if (type === 'chat') {
            addChatMsg(userId, avatar, color, text);
          } else if (type === 'leave') {
            const u = onlineUsers[userId];
            delete onlineUsers[userId];
            updateUsersList();
            if (u) addChatMsg(null, null, null, `${u.avatar} 修行者离去`, true);
          }
        }
      } catch(err) { console.warn('[muyu ws]', err); }
    };

    ws.onclose = () => {
      delete onlineUsers[MY_ID];
      updateUsersList();
      // 5秒后重连
      setTimeout(connectRealtime, 5000);
    };

    // 广播函数：payload 放在 payload.payload 里，符合 Supabase Realtime 规范
    function broadcast(payload) {
      if (ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({
        topic: `realtime:${ROOM}`,
        event: 'broadcast',
        payload: { event: 'msg', payload },
        ref: Math.random().toString()
      }));
    }

    window._muyuBroadcast = broadcast;

    function broadcastPresence() {
      broadcast({ type: 'presence', userId: MY_ID, avatar: MY_AVATAR, color: MY_COLOR, merit });
    }

    // 页面关闭时广播离开
    window.addEventListener('beforeunload', () => {
      broadcast({ type: 'leave', userId: MY_ID, avatar: MY_AVATAR, color: MY_COLOR });
    });

    // 自己加入用户列表
    onlineUsers[MY_ID] = { id: MY_ID, avatar: MY_AVATAR, color: MY_COLOR, merit: 0 };
    updateUsersList();

    return { broadcastPresence };
  }

  // 在 hit() 后广播敲击
  const _origAddMerit = addMerit;
  window._muyuOnHit = function() {
    if (window._muyuBroadcast) {
      window._muyuBroadcast({ type: 'hit', userId: MY_ID, avatar: MY_AVATAR, color: MY_COLOR, merit });
    }
    if (onlineUsers[MY_ID]) { onlineUsers[MY_ID].merit = merit; updateUsersList(); }
  };

  // 劫持 muyuWrapper click，在 hit 后广播
  muyuWrapper.addEventListener('click', () => {
    setTimeout(() => window._muyuOnHit && window._muyuOnHit(), 50);
  });

  // 发送聊天
  function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    if (window._muyuBroadcast) {
      window._muyuBroadcast({ type: 'chat', userId: MY_ID, avatar: MY_AVATAR, color: MY_COLOR, text });
    }
    addChatMsg(MY_ID, MY_AVATAR, MY_COLOR, text);
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  // 页面加载后立即连接
  connectRealtime();

</script>
</body>
</html>
